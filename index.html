<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gerador de Ideias</title>

<style>
body {
    background: #1e1e1e;
    color: white;
    font-family: Arial;
    text-align: center;
}

input, button {
    padding: 10px;
    margin: 10px;
    background: #2d2d2d;
    color: white;
    border: none;
}

.container {
    margin-top: 20px;
}

.tag {
    display: inline-block;
    background: #2d2d2d;
    padding: 8px 12px;
    margin: 5px;
    border: 1px solid #555;
}

.info {
    font-size: 12px;
    color: #aaa;
}

.desafio {
    margin-top: 15px;
    font-size: 16px;
    color: #00ff9c;
}
</style>
</head>

<body>

<h2>🎨 Gerador de Ideias V0.5</h2>

<input type="number" id="complexidade" placeholder="Complexidade">
<div class="info">
Complexidade = quantidade de palavras sorteadas
</div>

<label>
<input type="checkbox" id="modoDesafio">
 Ativar desafio 🎯
</label>

<br>
<button onclick="gerar()">Gerar Ideia</button>

<div class="container" id="resultado"></div>
<div id="desafioBox" class="desafio"></div>

<script>

// 📦 Categorias (organização interna)
const categorias = {
    personagens: ["samurai","robô","dragão","mago","zumbi","alienígena"],
    lugares: ["floresta","deserto","cidade"],
    estilos: ["cyberpunk","futurista","sombrio","colorido"],
    atributos: ["gigante","voador"],
    extras: ["com espada","com asas","com máscara","com energia elétrica"]
};

// 🎯 Desafios
const desafios = [
    "Desenhe em 1 minuto",
    "Desenhe em 5 minutos",
    "Desenhe em 10 minutos",
    "Desenhe em 20 minutos"
];

// 🔄 Junta tudo automaticamente (sem bagunça)
function juntarPalavras() {
    let todas = [];
    for (let cat in categorias) {
        todas = todas.concat(categorias[cat]);
    }
    return todas;
}

function gerar() {
    const comp = parseInt(document.getElementById("complexidade").value);
    const resultado = document.getElementById("resultado");
    const desafioBox = document.getElementById("desafioBox");
    const modoDesafio = document.getElementById("modoDesafio").checked;

    resultado.innerHTML = "";
    desafioBox.innerHTML = "";

    if (!comp || comp < 1) return;

    let palavras = juntarPalavras();
    let copia = [...palavras];

    for (let i = 0; i < comp; i++) {
        if (copia.length === 0) break;

        let index = Math.floor(Math.random() * copia.length);
        let palavra = copia.splice(index, 1)[0];

        let tag = document.createElement("div");
        tag.className = "tag";
        tag.innerText = palavra;

        resultado.appendChild(tag);
    }

    // 🎯 Sistema de desafio
    if (modoDesafio) {
        let desafio = desafios[Math.floor(Math.random() * desafios.length)];
        desafioBox.innerText = "🔥 Desafio: " + desafio;
    }
}

</script>

</body>
</html>
